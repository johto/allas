name: Run tests
on:
  workflow_call:

jobs:
  test:
    name: ⛐
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out allas
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: allas

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: Build and test
        run: |
          cd allas

          go build
          go test -v ./...
